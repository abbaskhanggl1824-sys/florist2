name: AI Contact Form Automation

on:
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab
  schedule:
    - cron: '0 9 * * 1-5' # Automatically runs every Monday to Friday at 9:00 AM UTC

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium Browser
        run: |
          playwright install chromium

      - name: Run Contact Bot Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: |
          python contact_bot.py

      - name: Upload Error Screenshots & Debug Logs
        if: always() # Ensures logs and screenshots upload even if the script fails or gets canceled
        uses: actions/upload-artifact@v4
        with:
          name: bot-debug-artifacts
          path: |
            screenshots/
            page_source.html
            error_screenshot.png
          retention-days: 7
